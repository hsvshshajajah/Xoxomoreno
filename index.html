<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor CabHub Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 1.5rem;
            padding: 3rem;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid #334155;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 2rem;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .status-down { display: none; }
        .icon-error { font-size: 4rem; margin-bottom: 1.5rem; color: #ef4444; }
        h1 { font-size: 1.8rem; margin-bottom: 1rem; }
        p { color: #94a3b8; line-height: 1.6; margin-bottom: 2rem; }
        
        .btn {
            background: #3b82f6;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }
        
        .notif-log {
            margin-top: 2rem;
            font-size: 0.8rem;
            padding: 1rem;
            background: #0f172a;
            border-radius: 0.5rem;
            text-align: left;
            color: #64748b;
        }
        .ok { color: #22c55e; }
        .err { color: #ef4444; }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <!-- Pantalla de Carga -->
    <div id="loading-screen">
        <div class="loader"></div>
        <h1>Verificando CabHub</h1>
        <p>Realizando ping instantáneo al servidor...</p>
    </div>

    <!-- Pantalla de Error -->
    <div id="error-screen" class="status-down">
        <div class="icon-error">✕</div>
        <h1>Servicio Caído</h1>
        <p>CabHub no responde. Se han enviado alertas automáticas a Discord y al equipo técnico.</p>
        <button class="btn" onclick="location.reload()">Reintentar ahora</button>
        <div class="notif-log" id="log"></div>
    </div>
</div>

<script>
    const TARGET_URL = "https://cabhub.edgeone.app/";
    const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1487146109720727797/mdRFxKU7E9M0yCznc29Knxm3I6GluRRFa6QxAk_gCavLWCfhBeat1VN6EzRGXVcMingO";
    const EMAIL = "cabhub.inc@gmail.com";

    function log(msg, type) {
        const div = document.getElementById('log');
        div.innerHTML += `<div class="${type}">${msg}</div>`;
    }

    async function sendAlerts() {
        const now = new Date().toLocaleString();
        
        // 1. Discord Webhook
        try {
            await fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    content: `🚨 **ALERTA: CabHub Caído**\n📅 Fecha: ${now}\n🔗 URL: ${TARGET_URL}\n📧 Notificado: ${EMAIL}`
                })
            });
            log("✓ Discord notificado", "ok");
        } catch(e) { log("✕ Error Discord", "err"); }

        // 2. Email (Abre cliente)
        const subject = encodeURIComponent("🚨 CabHub Caído - Alerta Crítica");
        const body = encodeURIComponent(`El monitor ha detectado que CabHub (${TARGET_URL}) no responde.\nFecha: ${now}`);
        window.open(`mailto:${EMAIL}?subject=${subject}&body=${body}`, '_blank');
        log("✓ Email preparado", "ok");
    }

    function showDown() {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('error-screen').style.display = 'block';
        sendAlerts();
    }

    // MÉTODO ULTRA RÁPIDO: Ping mediante carga de recurso (No CORS)
    function fastPing() {
        let responded = false;
        const timeout = setTimeout(() => {
            if (!responded) showDown();
        }, 5000); // 5 segundos de espera máxima

        // Intentamos cargar el favicon o la raíz como una imagen
        // Esto funciona aunque el servidor no permita CORS, porque solo nos importa si responde
        const img = new Image();
        img.onload = () => {
            responded = true;
            clearTimeout(timeout);
            window.top.location.href = TARGET_URL;
        };
        img.onerror = () => {
            // Si el servidor responde (aunque sea un 404 o error de imagen), 
            // significa que el servidor ESTÁ VIVO.
            responded = true;
            clearTimeout(timeout);
            window.top.location.href = TARGET_URL;
        };
        
        // Añadimos un timestamp para evitar caché
        img.src = TARGET_URL + "/favicon.ico?t=" + Date.now();
    }

    window.onload = fastPing;
</script>

</body>
</html>
